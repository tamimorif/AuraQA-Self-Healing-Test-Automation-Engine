### infrastructure/nginx.conf
# ──────────────────────────────────────────────────────────────
# AuraQA — Nginx Reverse Proxy Configuration
# ──────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10m;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ── Upstream: Backend API ────────────────────────────────
    upstream backend_upstream {
        server backend:8000;
    }

    # ── Upstream: Mock App ───────────────────────────────────
    upstream mockapp_upstream {
        server mockapp:5173;
    }

    server {
        listen 80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── API routes → Backend ─────────────────────────────
        location /api/ {
            proxy_pass http://backend_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # ── Health endpoint (direct passthrough) ─────────────
        location = /api/health {
            proxy_pass http://backend_upstream/health;
            proxy_set_header Host $host;
        }

        # ── OpenAPI docs ─────────────────────────────────────
        location /docs {
            proxy_pass http://backend_upstream/docs;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://backend_upstream/openapi.json;
            proxy_set_header Host $host;
        }

        # ── All other routes → Mock App (SPA) ────────────────
        location / {
            proxy_pass http://mockapp_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
